<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduConnect Pro - Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c12;
      --card: #151a26;
      --accent: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.4);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(34, 197, 94, 0.05), transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.05), transparent 40%);
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      padding: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: block;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #16a34a);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    .error-toast {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #ef4444;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="header">
      <img src="cea_logo.png" alt="Logo CEA"
        style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); box-shadow: 0 0 20px var(--accent-glow); margin-bottom: 16px;">
      <h1>EduConnect Pro</h1>
      <p>Gestión Educativa Inteligente</p>
    </div>
    <div id="errorBox" class="error-toast"></div>
    <div class="form-group">
      <label>Correo Institucional</label>
      <input type="text" id="username" placeholder="nombreapellido@educonnect.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button id="loginBtn" class="btn" onclick="login()">Ingresar al Portal</button>
  </div>
  <script>
    const API = 'https://educonnect-backend-1.onrender.com';
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorBox');
      if (!username || !password) {
        err.textContent = 'Ingrese sus credenciales';
        err.style.display = 'block';
        return;
      }
      btn.textContent = 'Verificando...';
      btn.disabled = true;
      err.style.display = 'none';
      try {
        const res = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          const pages = { director: 'director.html', secretaria: 'secretaria.html', profesor: 'profesor.html', estudiante: 'estudiante.html' };
          window.location.href = pages[data.user.role] || 'index.html';
        } else {
          err.textContent = data.message || 'Error de acceso';
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Sin conexión con el servidor';
        err.style.display = 'block';
      }
      btn.textContent = 'Ingresar al Portal';
      btn.disabled = false;
    }
  </script>
</body>

</html>
